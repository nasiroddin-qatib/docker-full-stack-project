<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevOps Portfolio</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    header {
      padding: 30px;
      background: #1e293b;
    }

    h1 {
      margin: 0;
      font-size: 32px;
    }

    .container {
      margin-top: 60px;
    }

    button {
      padding: 12px 25px;
      background: #22c55e;
      border: none;
      border-radius: 5px;
      color: black;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    #output {
      margin-top: 30px;
      font-size: 20px;
      color: #38bdf8;
    }

    footer {
      margin-top: 80px;
      padding: 15px;
      background: #1e293b;
    }
  </style>
</head>

<body>

<header>
  <h1>🚀 DevOps Full Stack Project</h1>
  <p>Docker | Nginx | Node.js | CI/CD Ready</p>
</header>

<div class="container">
  <h2>Backend Integration Test</h2>
  <p>Click below to fetch data from backend API</p>

  <button onclick="getData()">Call Backend API</button>

  <div id="output"></div>
</div>

<footer>
  <p>© 2026 DevOps Project | Built for Interviews</p>
</footer>

<script>
function getData() {
  fetch("http://43.205.240.14:3000/api")
    .then(res => res.json())
    .then(data => {
      document.getElementById("output").innerText = data.message;
    })
    .catch(err => {
      document.getElementById("output").innerText = "Error connecting backend";
    });
}
</script>

</body>
</html>
